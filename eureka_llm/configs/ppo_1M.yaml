# PPO config for 1M timestep training (quick test)
env_id: "BipedalWalker-v3-round0"
total_timesteps: 1000000
device: "cpu"
n_envs: 8
normalize: true

evaluation:
  freq: 200000
  episodes: 5
  deterministic: true

checkpoint:
  freq: 200000

ppo:
  policy: "MlpPolicy"
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
